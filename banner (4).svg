<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="900" height="200">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="80%">
    <stop offset="0%" stop-color="#0c0018"/>
    <stop offset="100%" stop-color="#010006"/>
  </radialGradient>
  <radialGradient id="gL" cx="10%" cy="10%" r="55%">
    <stop offset="0%" stop-color="#7a0000" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="#7a0000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gR" cx="90%" cy="90%" r="50%">
    <stop offset="0%" stop-color="#00006a" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#00006a" stop-opacity="0"/>
  </radialGradient>
  <style>
    @keyframes eyeGlow  { 0%,100%{opacity:.88} 50%{opacity:1} }
    @keyframes ndPulse  { 0%,100%{opacity:.65} 50%{opacity:1} }
    @keyframes webPulse { 0%,100%{opacity:.42} 50%{opacity:.75} }
    @keyframes webPulseB{ 0%,100%{opacity:.35} 50%{opacity:.6}  }
    .eye { animation: eyeGlow 1.8s ease-in-out infinite; }
    .nd  { animation: ndPulse 2.8s ease-in-out infinite; }
    .wR  { animation: webPulse  3.2s ease-in-out infinite; }
    .wB  { animation: webPulseB 3.8s ease-in-out .6s infinite; }
  </style>
</defs>

<rect width="900" height="200" fill="url(#bg)"/>
<rect width="900" height="200" fill="url(#gL)"/>
<rect width="900" height="200" fill="url(#gR)"/>

<!-- RED WEB — top-left -->
<g class="wR" stroke="#880000" stroke-width="0.72" fill="none">
  <line x1="0" y1="0" x2="290" y2="0"/>
  <line x1="0" y1="0" x2="258" y2="72"/>
  <line x1="0" y1="0" x2="196" y2="138"/>
  <line x1="0" y1="0" x2="116" y2="188"/>
  <line x1="0" y1="0" x2="42"  y2="200"/>
  <line x1="0" y1="0" x2="0"   y2="200"/>
  <path d="M 56,0  A 56,56  0 0,1 0,56"/>
  <path d="M 112,0 A 112,112 0 0,1 0,112"/>
  <path d="M 168,0 A 168,168 0 0,1 0,168"/>
  <path d="M 224,0 A 224,224 0 0,1 0,224"/>
  <path d="M 280,0 A 280,280 0 0,1 0,280"/>
</g>

<!-- BLUE WEB — bottom-left corner (subtle) -->
<g class="wB" stroke="#000077" stroke-width="0.6" fill="none">
  <line x1="0" y1="200" x2="180" y2="200"/>
  <line x1="0" y1="200" x2="162" y2="132"/>
  <line x1="0" y1="200" x2="96"  y2="76"/>
  <line x1="0" y1="200" x2="24"  y2="12"/>
  <path d="M 52,200  A 52,52   0 0,1 0,148"/>
  <path d="M 104,200 A 104,104 0 0,1 0,96"/>
  <path d="M 156,200 A 156,156 0 0,1 0,44"/>
</g>

<!-- node connecting web threads -->
<g stroke="#2a0000" stroke-width="0.65" fill="none" opacity="0.6">
  <line x1="138" y1="78"  x2="248" y2="50"/>
  <line x1="138" y1="78"  x2="248" y2="152"/>
  <line x1="248" y1="50"  x2="358" y2="50"/>
  <line x1="248" y1="152" x2="358" y2="152"/>
  <line x1="248" y1="50"  x2="248" y2="152"/>
  <line x1="358" y1="50"  x2="358" y2="152"/>
  <line x1="358" y1="50"  x2="472" y2="78"/>
  <line x1="358" y1="152" x2="472" y2="128"/>
  <line x1="472" y1="78"  x2="472" y2="128"/>
  <line x1="472" y1="78"  x2="580" y2="100"/>
  <line x1="472" y1="128" x2="580" y2="100"/>
  <line x1="580" y1="100" x2="700" y2="100"/>
  <line x1="700" y1="100" x2="808" y2="47"/>
</g>

<!-- relay dot -->
<circle cx="580" cy="100" r="4" fill="#440000" stroke="#770000" stroke-width="0.8" opacity="0.55"/>
<circle cx="700" cy="100" r="3.5" fill="#330000" stroke="#660000" stroke-width="0.8" opacity="0.5"/>

<!-- ===== TECH NODES ===== -->

<!-- Python (138,78) -->
<g class="nd" transform="translate(138,78)">
  <circle cx="0" cy="0" r="25" fill="#07121c" stroke="#3572a5" stroke-width="1.5"/>
  <path d="M -5,-12 C -5,-16 5,-16 5,-12 L 5,-5 C 5,-1 -5,-1 -5,-5 Z" fill="#3572a5"/>
  <path d="M -5,12 C -5,16 5,16 5,12 L 5,5 C 5,1 -5,1 -5,5 Z" fill="#ffdd54"/>
  <circle cx="-2.5" cy="-8.5" r="2" fill="#ffdd54"/>
  <circle cx=" 2.5" cy=" 8.5" r="2" fill="#3572a5"/>
</g>

<!-- HTML (248,50) -->
<g class="nd" transform="translate(248,50)">
  <circle cx="0" cy="0" r="23" fill="#180400" stroke="#e34c26" stroke-width="1.5"/>
  <path d="M -8.5,10.5 L -10.5,-10.5 L 10.5,-10.5 L 8.5,10.5 L 0,13 Z" fill="#e34c26"/>
  <path d="M -5.5,7.5 L -7.5,-7.5 L 7.5,-7.5 L 5.5,7.5 L 0,9.5 Z" fill="#f06529"/>
  <line x1="-3.5" y1="-3.5" x2="3.5" y2="-3.5" stroke="#fff" stroke-width="1.4" fill="none"/>
  <line x1="-3"   y1=" 1.5" x2="3"   y2=" 1.5" stroke="#fff" stroke-width="1.4" fill="none"/>
</g>

<!-- CSS (248,152) -->
<g class="nd" transform="translate(248,152)">
  <circle cx="0" cy="0" r="23" fill="#020818" stroke="#264de4" stroke-width="1.5"/>
  <path d="M -8.5,10.5 L -10.5,-10.5 L 10.5,-10.5 L 8.5,10.5 L 0,13 Z" fill="#264de4"/>
  <path d="M -5.5,7.5 L -7.5,-7.5 L 7.5,-7.5 L 5.5,7.5 L 0,9.5 Z" fill="#2965f1"/>
  <line x1="-3.5" y1="-3.5" x2="3.5"  y2="-3.5" stroke="#fff" stroke-width="1.4" fill="none"/>
  <line x1="-4"   y1=" 1.5" x2="4.5"  y2=" 1.5" stroke="#fff" stroke-width="1.4" fill="none"/>
</g>

<!-- JS (358,50) -->
<g class="nd" transform="translate(358,50)">
  <circle cx="0" cy="0" r="23" fill="#181300" stroke="#f0db4f" stroke-width="1.5"/>
  <rect x="-10" y="-10" width="20" height="20" rx="2.5" fill="#f0db4f" opacity="0.13"/>
  <text x="1" y="7" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="13" font-weight="900" fill="#f0db4f">JS</text>
</g>

<!-- C++ (358,152) -->
<g class="nd" transform="translate(358,152)">
  <circle cx="0" cy="0" r="23" fill="#070714" stroke="#6666cc" stroke-width="1.5"/>
  <text x="0" y="6" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-size="12" font-weight="900" fill="#8888ee">C++</text>
</g>

<!-- Git (472,78) -->
<g class="nd" transform="translate(472,78)">
  <circle cx="0" cy="0" r="23" fill="#140500" stroke="#f05033" stroke-width="1.5"/>
  <circle cx="0"  cy="-8" r="3.5" fill="#f05033"/>
  <circle cx="-7" cy=" 7" r="3.5" fill="#f05033"/>
  <circle cx=" 7" cy=" 7" r="3.5" fill="#f05033"/>
  <line x1="0" y1="-4.5" x2="0" y2="0" stroke="#f05033" stroke-width="1.8"/>
  <path d="M 0,0 C 0,3.5 -7,3.5 -7,3.5" stroke="#f05033" stroke-width="1.8" fill="none"/>
  <path d="M 0,0 C 0,3.5  7,3.5  7,3.5" stroke="#f05033" stroke-width="1.8" fill="none"/>
</g>

<!-- VS Code (472,128) -->
<g class="nd" transform="translate(472,128)">
  <circle cx="0" cy="0" r="23" fill="#000e18" stroke="#007acc" stroke-width="1.5"/>
  <polyline points="-8,-7 -13,0 -8,7"  stroke="#007acc" stroke-width="2.1" fill="none" stroke-linecap="round"/>
  <polyline points=" 8,-7  13,0  8,7"  stroke="#007acc" stroke-width="2.1" fill="none" stroke-linecap="round"/>
  <line x1="-2.5" y1="-9" x2="2.5" y2="9" stroke="#007acc" stroke-width="1.5"/>
</g>

<!-- ===== SPIDER-MAN — swinging from top-right ===== -->
<g>
  <animateTransform
    attributeName="transform"
    type="rotate"
    values="-8,820,2; 8,820,2; -8,820,2"
    dur="2.6s"
    repeatCount="indefinite"
    calcMode="spline"
    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>

  <!-- web strand from ceiling to right wrist -->
  <line x1="820" y1="2" x2="806" y2="46" stroke="#cc2200" stroke-width="1.3" opacity="0.9"/>

  <!-- ---- left leg ---- -->
  <path d="M 759,122 C 750,136 744,150 746,163" stroke="#00008b" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 746,163 C 745,170 749,177 751,181" stroke="#cc0000" stroke-width="7"  fill="none" stroke-linecap="round"/>

  <!-- ---- right leg ---- -->
  <path d="M 771,122 C 781,136 787,150 784,163" stroke="#00008b" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 784,163 C 785,170 781,177 778,181" stroke="#cc0000" stroke-width="7"  fill="none" stroke-linecap="round"/>

  <!-- ---- left arm (free, slightly out) ---- -->
  <path d="M 755,90 C 742,97 726,102 712,107" stroke="#00008b" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 712,107 C 707,110 703,113 701,117" stroke="#cc0000" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- ---- right arm (holding web upward) ---- -->
  <path d="M 779,88 C 790,72 800,58 806,46" stroke="#cc0000" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- ---- hips / lower body (blue) ---- -->
  <path d="M 753,110 C 750,116 750,123 753,125 L 777,125 C 780,123 780,116 777,110 Z" fill="#00008b"/>

  <!-- ---- upper chest (red) ---- -->
  <path d="M 754,80 C 748,85 746,97 748,110 L 782,110 C 784,97 782,85 776,80 Z" fill="#cc0000"/>

  <!-- web lines on chest -->
  <line x1="765" y1="80"  x2="765" y2="110" stroke="#880000" stroke-width="0.75"/>
  <line x1="748" y1="95"  x2="782" y2="95"  stroke="#880000" stroke-width="0.75"/>
  <path d="M 754,82 Q 765,79 776,82" fill="none" stroke="#880000" stroke-width="0.65"/>
  <path d="M 751,89 Q 765,86 779,89" fill="none" stroke="#880000" stroke-width="0.65"/>
  <path d="M 749,102 Q 765,99 781,102" fill="none" stroke="#880000" stroke-width="0.65"/>

  <!-- ---- spider logo on chest ---- -->
  <ellipse cx="765" cy="89" rx="4"   ry="5.5" fill="#111"/>
  <ellipse cx="765" cy="99" rx="3"   ry="4"   fill="#111"/>
  <line x1="761" y1="87" x2="754" y2="83" stroke="#111" stroke-width="1.4"/>
  <line x1="761" y1="92" x2="753" y2="91" stroke="#111" stroke-width="1.4"/>
  <line x1="769" y1="87" x2="776" y2="83" stroke="#111" stroke-width="1.4"/>
  <line x1="769" y1="92" x2="777" y2="91" stroke="#111" stroke-width="1.4"/>

  <!-- ---- neck ---- -->
  <rect x="761" y="76" width="8" height="6" fill="#cc0000"/>

  <!-- ---- HEAD base (red) ---- -->
  <circle cx="765" cy="62" r="20" fill="#cc0000"/>

  <!-- web pattern on mask -->
  <line x1="765" y1="42" x2="765" y2="82"  stroke="#880000" stroke-width="0.75"/>
  <line x1="745" y1="62" x2="785" y2="62"  stroke="#880000" stroke-width="0.75"/>
  <line x1="748" y1="48" x2="782" y2="76"  stroke="#880000" stroke-width="0.55"/>
  <line x1="782" y1="48" x2="748" y2="76"  stroke="#880000" stroke-width="0.55"/>
  <path d="M 749,52 A 21,21 0 0,1 781,52"  fill="none" stroke="#880000" stroke-width="0.65"/>
  <path d="M 747,62 A 18,18 0 0,1 783,62"  fill="none" stroke="#880000" stroke-width="0.65"/>
  <path d="M 748,72 A 18,18 0 0,0 782,72"  fill="none" stroke="#880000" stroke-width="0.65"/>

  <!-- ---- EYES (iconic white almond lenses) ---- -->
  <ellipse class="eye" cx="758" cy="59" rx="8.5" ry="6" fill="white" transform="rotate(-20,758,59)"/>
  <ellipse class="eye" cx="773" cy="59" rx="8.5" ry="6" fill="white" transform="rotate( 20,773,59)"/>
</g>

<!-- corner accents -->
<line x1="0"   y1="0"   x2="50"  y2="0"   stroke="#ff0000" stroke-width="2.5"/>
<line x1="0"   y1="0"   x2="0"   y2="50"  stroke="#ff0000" stroke-width="2.5"/>
<line x1="900" y1="200" x2="850" y2="200" stroke="#0044ff" stroke-width="2.5"/>
<line x1="900" y1="200" x2="900" y2="150" stroke="#0044ff" stroke-width="2.5"/>
<line x1="900" y1="0"   x2="858" y2="0"   stroke="#444"    stroke-width="1.2" opacity="0.6"/>
<line x1="900" y1="0"   x2="900" y2="44"  stroke="#444"    stroke-width="1.2" opacity="0.6"/>
<line x1="0"   y1="200" x2="44"  y2="200" stroke="#660022" stroke-width="1.2" opacity="0.6"/>
<line x1="0"   y1="200" x2="0"   y2="156" stroke="#660022" stroke-width="1.2" opacity="0.6"/>
</svg>
