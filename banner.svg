<!-- Corner accent bars -->
<line x1="0" y1="0" x2="55" y2="0"   stroke="#ff0000" stroke-width="3"/>
<line x1="0" y1="0" x2="0"  y2="55"  stroke="#ff0000" stroke-width="3"/>
<line x1="900" y1="280" x2="845" y2="280" stroke="#0055ff" stroke-width="3"/>
<line x1="900" y1="280" x2="900" y2="225" stroke="#0055ff" stroke-width="3"/>
