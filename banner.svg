<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#0a0010"/>
    <stop offset="45%" stop-color="#1a0022"/>
    <stop offset="100%" stop-color="#00081a"/>
  </linearGradient>
  <radialGradient id="rg1" cx="25%" cy="40%" r="45%">
    <stop offset="0%" stop-color="#aa0000" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#aa0000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rg2" cx="75%" cy="60%" r="45%">
    <stop offset="0%" stop-color="#0033cc" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#0033cc" stop-opacity="0"/>
  </radialGradient>
  <style>
    @keyframes pulseRed {
      0%,100%{opacity:0.55} 50%{opacity:1}
    }
    @keyframes pulseBlue {
      0%,100%{opacity:0.45} 50%{opacity:0.85}
    }
    @keyframes fadeTitle {
      0%,100%{opacity:0.95} 50%{opacity:1}
    }
    @keyframes rotateSlow {
      from{transform:rotate(0deg)} to{transform:rotate(360deg)}
    }
    @keyframes dashDraw {
      from{stroke-dashoffset:600} to{stroke-dashoffset:0}
    }
    .wr{animation:pulseRed 3s ease-in-out infinite; transform-origin:0 0}
    .wb{animation:pulseBlue 3.5s ease-in-out infinite; transform-origin:900px 280px}
    .title{animation:fadeTitle 4s ease-in-out infinite}
    .ring1{animation:dashDraw 4s ease-out forwards}
    .ring2{animation:dashDraw 5s ease-out 0.5s forwards}
  </style>
</defs>

<!-- Background -->
<rect width="900" height="280" fill="url(#bg)"/>
<rect width="900" height="280" fill="url(#rg1)"/>
<rect width="900" height="280" fill="url(#rg2)"/>

<!-- Halftone dots -->
<g opacity="0.035">
  <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
    <circle cx="7" cy="7" r="1.3" fill="#ffffff"/>
  </pattern>
  <rect width="900" height="280" fill="url(#dots)"/>
</g>

<!-- RED WEB — top left corner -->
<g class="wr" stroke="#cc0000" stroke-width="0.75" fill="none">
  <line x1="0" y1="0" x2="290" y2="0"/>
  <line x1="0" y1="0" x2="281" y2="75"/>
  <line x1="0" y1="0" x2="252" y2="146"/>
  <line x1="0" y1="0" x2="205" y2="205"/>
  <line x1="0" y1="0" x2="146" y2="252"/>
  <line x1="0" y1="0" x2="75" y2="281"/>
  <line x1="0" y1="0" x2="0" y2="290"/>
  <path d="M 55,0 A 55,55 0 0,1 0,55"/>
  <path d="M 110,0 A 110,110 0 0,1 0,110"/>
  <path d="M 165,0 A 165,165 0 0,1 0,165"/>
  <path d="M 220,0 A 220,220 0 0,1 0,220"/>
  <path d="M 275,0 A 275,275 0 0,1 0,275"/>
</g>

<!-- BLUE WEB — bottom right corner -->
<g class="wb" stroke="#0044cc" stroke-width="0.75" fill="none">
  <line x1="900" y1="280" x2="610" y2="280"/>
  <line x1="900" y1="280" x2="619" y2="205"/>
  <line x1="900" y1="280" x2="648" y2="134"/>
  <line x1="900" y1="280" x2="695" y2="75"/>
  <line x1="900" y1="280" x2="754" y2="28"/>
  <line x1="900" y1="280" x2="825" y2="0"/>
  <line x1="900" y1="280" x2="900" y2="-10"/>
  <path d="M 845,280 A 55,55 0 0,0 900,225"/>
  <path d="M 790,280 A 110,110 0 0,0 900,170"/>
  <path d="M 735,280 A 165,165 0 0,0 900,115"/>
  <path d="M 680,280 A 220,220 0 0,0 900,60"/>
  <path d="M 625,280 A 275,275 0 0,0 900,5"/>
</g>

<!-- GREY WEB — top right (noir) -->
<g stroke="#555555" stroke-width="0.5" fill="none" opacity="0.35">
  <line x1="900" y1="0" x2="680" y2="0"/>
  <line x1="900" y1="0" x2="700" y2="80"/>
  <line x1="900" y1="0" x2="780" y2="130"/>
  <line x1="900" y1="0" x2="900" y2="150"/>
  <path d="M 845,0 A 55,55 0 0,0 900,55"/>
  <path d="M 790,0 A 110,110 0 0,0 900,110"/>
</g>

<!-- Multiverse rings -->
<g transform="translate(450,140)" fill="none">
  <circle cx="0" cy="0" r="108" stroke="#ff000025" stroke-width="1.2" stroke-dasharray="8 5" class="ring1" stroke-dashoffset="600"/>
  <circle cx="0" cy="0" r="85"  stroke="#0044ff20" stroke-width="1"   stroke-dasharray="6 6" class="ring2" stroke-dashoffset="600"/>
</g>

<!-- SPIDER BODY (center-left) -->
<g transform="translate(155,140)" opacity="0.22">
  <ellipse cx="0" cy="0" rx="13" ry="18" fill="#ff0000"/>
  <ellipse cx="0" cy="22" rx="10" ry="14" fill="#cc0000"/>
  <g stroke="#ff2200" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="-13" y1="-5"  x2="-35" y2="-20"/>
    <line x1="-13" y1="2"   x2="-36" y2="2"/>
    <line x1="-13" y1="9"   x2="-34" y2="22"/>
    <line x1="-11" y1="15"  x2="-28" y2="34"/>
    <line x1="13"  y1="-5"  x2="35"  y2="-20"/>
    <line x1="13"  y1="2"   x2="36"  y2="2"/>
    <line x1="13"  y1="9"   x2="34"  y2="22"/>
    <line x1="11"  y1="15"  x2="28"  y2="34"/>
  </g>
  <ellipse cx="-5" cy="-6" rx="4" ry="3" fill="white" opacity="0.9"/>
  <ellipse cx="5"  cy="-6" rx="4" ry="3" fill="white" opacity="0.9"/>
</g>

<!-- SPIDER BODY (center-right, blue Miles) -->
<g transform="translate(745,140)" opacity="0.2">
  <ellipse cx="0" cy="0" rx="13" ry="18" fill="#0044ff"/>
  <ellipse cx="0" cy="22" rx="10" ry="14" fill="#0033bb"/>
  <g stroke="#2266ff" stroke-width="1.8" fill="none" stroke-linecap="round">
    <line x1="-13" y1="-5"  x2="-35" y2="-20"/>
    <line x1="-13" y1="2"   x2="-36" y2="2"/>
    <line x1="-13" y1="9"   x2="-34" y2="22"/>
    <line x1="-11" y1="15"  x2="-28" y2="34"/>
    <line x1="13"  y1="-5"  x2="35"  y2="-20"/>
    <line x1="13"  y1="2"   x2="36"  y2="2"/>
    <line x1="13"  y1="9"   x2="34"  y2="22"/>
    <line x1="11"  y1="15"  x2="28"  y2="34"/>
  </g>
  <ellipse cx="-5" cy="-6" rx="4" ry="3" fill="white" opacity="0.9"/>
  <ellipse cx="5"  cy="-6" rx="4" ry="3" fill="white" opacity="0.9"/>
</g>

<!-- MAIN TITLE -->
<text x="450" y="118" text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="54" font-weight="900"
      fill="#ffffff" letter-spacing="3"
      class="title">MD AYAN RAZA</text>

<!-- Red underline bar -->
<rect x="215" y="127" width="470" height="3" fill="#FF0000" rx="1.5"/>
<rect x="310" y="131" width="280" height="1.5" fill="#0055ff" rx="1" opacity="0.8"/>

<!-- Role pill badges -->
